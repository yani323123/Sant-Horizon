<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santé & Bien-être</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f7f8;
    margin: 0;
    padding: 0;
}

header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

button {
    background: #2e7d32;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<header>
    <h1>Santé & Bien-être</h1>
    <p>Informations générales sur la santé et le bien-être</p>
</header>

<div class="container">

    <div class="card">
        <h2>Prévention</h2>
        <p>Conseils de base pour maintenir une bonne santé.</p>
    </div>

    <div class="card">
        <h2>Produits recommandés</h2>
        <ul>
            <li>Thermomètre</li>
            <li>Tensiomètre</li>
            <li>Trousse de premiers secours</li>
        </ul>
    </div>

    <div class="card">
        <h2>Partenariats</h2>
        <p>Contactez-nous pour discuter d'une collaboration.</p>
        <button>Nous contacter</button>
    </div>

</div>

</body>
</html>
